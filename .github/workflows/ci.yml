name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: typecheck (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api]"
      - run: mypy src/

  audit:
    name: audit (pip-audit)
    runs-on: ubuntu-latest
    # Don't gate the build on transient advisories; surface them in the run log
    # and let humans triage. Flip to false once the project has a tighter
    # dependency policy and known advisories are addressed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-audit
      # Audit the runtime requirements file directly. Auditing an editable
      # install of this package errors out on '--strict' even with
      # '--skip-editable'; scanning requirements.txt is what we actually care
      # about anyway — that's what gets installed on Streamlit Cloud and in
      # the Docker image. torch's CPU wheel (torch==2.x.y+cpu, pulled from
      # pytorch.org) is reported as "skipped — not on PyPI" and logged.
      - run: pip-audit -r requirements.txt --progress-spinner=off

  test:
    name: test (pytest, ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # Install api extras too — without fastapi/httpx, tests/test_api.py is
      # skipped, src/api.py drops to 0% coverage and the project total falls
      # below the 85% threshold.
      - run: pip install -e ".[dev,api]"
      - run: pytest -v --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=85 tests/
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false
