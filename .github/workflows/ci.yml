name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: typecheck (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api]"
      - run: mypy src/

  audit:
    name: audit (pip-audit)
    runs-on: ubuntu-latest
    # Don't gate the build on transient advisories; surface them in the run log
    # and let humans triage. Flip to false once the project has a tighter
    # dependency policy and known advisories are addressed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api]"
      - run: pip install pip-audit
      # --skip-editable: don't try to audit our own package (not on PyPI).
      # --strict was dropped: with the editable install present, pip-audit
      # emits a warning that --strict promotes to a hard failure even when
      # no advisory was actually found. Real advisories still exit non-zero.
      - run: pip-audit --progress-spinner=off --skip-editable

  test:
    name: test (pytest, ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # Install api extras too — without fastapi/httpx, tests/test_api.py is
      # skipped, src/api.py drops to 0% coverage and the project total falls
      # below the 85% threshold.
      - run: pip install -e ".[dev,api]"
      - run: pytest -v --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=85 tests/
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false
